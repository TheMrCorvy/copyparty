# =============================================================================
# copyparty.conf — Main Configuration File
# =============================================================================
# This file is read by copyparty on startup from /cfg inside the container.
# Edit this file to change volumes, permissions, and global settings.
# Restart (or send USR1 signal) to reload: docker kill --signal=USR1 copyparty
# =============================================================================

[global]
# ----- Network ---------------------------------------------------------------
# Port inside the container (mapped to host via docker-compose ports section)
p: 3923

# Bind to all interfaces so Docker port-mapping works correctly
i: 0.0.0.0

# ----- History / Index storage -----------------------------------------------
# Store copyparty's internal DB, thumbnails, and search index under /cfg/hist
# instead of polluting your actual data directories with .hist folders.
hist: /cfg/hist

# ----- Performance & Resource efficiency -------------------------------------
# NOTE: 'no-motd' was removed in newer copyparty versions (no replacement needed).
# NOTE: 'st' (scan threads) was removed/renamed — the ambiguous --st flag crashed v1.16+.
#       copyparty manages its own thread pool automatically; no manual setting required.

# Disable background thumbnail generation — the single biggest CPU/RAM saver.
# Thumbnails are still generated on-demand when you browse a folder.
# Remove this line if you want pre-generated thumbnails (costs more RAM/CPU).
no-thumb

# Disable automatic file deduplication hashing on startup.
# Dedup is great but costs significant CPU on first scan of large drives.
# You can trigger it manually from the web UI when needed.
# no-hash takes a regex pattern of paths to skip; use .* to skip all files (saves CPU on startup)
no-hash: .*

# NOTE: 'fnew' (inotify watcher cap) is no longer a valid config key in v1.20+.
#       Inotify limits are managed at the OS level on Linux hosts (not macOS/OrbStack).

# I/O buffer size (bytes). 256 KB is a sweet spot for LAN transfers.
iobuf: 262144

# ----- Logging ---------------------------------------------------------------
# Use -q for quiet mode (suppress most stdout). Remove to see full logs.
# NOTE: 'log-lv' is not a valid config key in v1.20+; use the -q flag instead.
q


# =============================================================================
# VOLUMES
# =============================================================================
# Syntax:
#   [/browser-path]           ← URL path in the web UI
#   /container/path           ← Filesystem path inside the container
#   accs: PERMS: USER         ← Access control (*  = anonymous/everyone)
#
# Permission codes:
#   r  = read/download
#   w  = write/upload
#   m  = move/rename
#   d  = delete
#   A  = admin (all of the above)
#
# Since this is a local-only network with no password, we grant full access
# to anonymous users (*). Tighten these if you ever expose to the internet.
# =============================================================================

# --- Main Internal Drive -----------------------------------------------------
[/main]
/drives/main
accs:
  rwmd: *

# --- External USB Drive 1 ----------------------------------------------------
[/external1]
/drives/external1
accs:
  rwmd: *

# --- External USB Drive 2 ----------------------------------------------------
[/external2]
/drives/external2
accs:
  rwmd: *
