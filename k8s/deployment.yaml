# =============================================================================
# k8s/deployment.yaml
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: copyparty
  namespace: copyparty
  labels:
    app: copyparty
    component: fileserver
spec:
  replicas: 1   # Single replica — file servers must not run in parallel with local storage
  selector:
    matchLabels:
      app: copyparty
  strategy:
    type: Recreate   # Ensures old pod terminates before new one starts (required for ReadWriteOnce PVCs)
  template:
    metadata:
      labels:
        app: copyparty
        component: fileserver
    spec:
      # ── Schedule only on the node where drives are attached ──────────────
      # Matches nodeAffinity defined in persistent-volumes.yaml
      nodeSelector:
        kubernetes.io/hostname: your-node-name   # ← Replace with your node name

      containers:
        - name: copyparty
          image: ghcr.io/9001/copyparty-ac:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 3923
              name: http
              protocol: TCP

          env:
            - name: CPP_CFG
              value: /cfg/copyparty.conf
            - name: TZ
              value: "America/New_York"   # ← Update your timezone

          # ── Volume mounts ────────────────────────────────────────────────
          volumeMounts:
            # Config file from ConfigMap (read-only — config is managed via K8s)
            - name: config-file
              mountPath: /cfg/copyparty.conf
              subPath: copyparty.conf
              readOnly: true
            # Secrets file (read-only — config is managed via K8s Secret)
            - name: secrets-file
              mountPath: /cfg/secrets.conf
              subPath: secrets.conf
              readOnly: true
            # Hist/index dir from PVC (read-write — copyparty writes its DB here)
            - name: config-storage
              mountPath: /cfg/hist
              subPath: hist
            # Drives
            - name: main-drive
              mountPath: /drives/main
            - name: external1-drive
              mountPath: /drives/external1
            - name: external2-drive
              mountPath: /drives/external2
            - name: external3-drive
              mountPath: /drives/external3

          # ── Resource limits (keep the Mac Mini healthy) ──────────────────
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

          # ── Health probes ────────────────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /
              port: 3923
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /
              port: 3923
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          # ── Security context ─────────────────────────────────────────────
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false   # copyparty needs /tmp write access
            runAsNonRoot: false             # copyparty image may run as root internally

      # ── Volume definitions ───────────────────────────────────────────────
      volumes:
        - name: config-file
          configMap:
            name: copyparty-config
        - name: config-storage
          persistentVolumeClaim:
            claimName: copyparty-config-pvc
        - name: secrets-file
          secret:
            secretName: copyparty-secrets
        - name: main-drive
          persistentVolumeClaim:
            claimName: copyparty-main-pvc
        - name: external1-drive
          persistentVolumeClaim:
            claimName: copyparty-ext1-pvc
        - name: external2-drive
          persistentVolumeClaim:
            claimName: copyparty-ext2-pvc
        - name: external3-drive
          persistentVolumeClaim:
            claimName: copyparty-ext3-pvc
