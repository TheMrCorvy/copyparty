# =============================================================================
# k8s/persistent-volume-claims.yaml
# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: copyparty-main-pvc
  namespace: copyparty
  labels:
    app: copyparty
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-storage
  resources:
    requests:
      storage: 500Gi
  selector:
    matchLabels:
      drive: main

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: copyparty-ext1-pvc
  namespace: copyparty
  labels:
    app: copyparty
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-storage
  resources:
    requests:
      storage: 2Ti
  selector:
    matchLabels:
      drive: external1

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: copyparty-ext2-pvc
  namespace: copyparty
  labels:
    app: copyparty
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-storage
  resources:
    requests:
      storage: 2Ti
  selector:
    matchLabels:
      drive: external2

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: copyparty-config-pvc
  namespace: copyparty
  labels:
    app: copyparty
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-storage
  resources:
