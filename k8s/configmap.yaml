# =============================================================================
# k8s/configmap.yaml
# =============================================================================
# The copyparty.conf is stored as a Kubernetes ConfigMap so it can be mounted
# into the pod without baking it into the container image.
# Update this ConfigMap and rollout-restart the Deployment to apply changes.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: copyparty-config
  namespace: copyparty
  labels:
    app: copyparty
data:
  copyparty.conf: |
    [global]
    p: 3923
    i: 0.0.0.0
    hist: /cfg/hist
    no-motd: true
    iobuf: 262144
    log-lv: 1

    # Load credentials from an untracked secrets.conf file mounted from a K8s Secret
    % secrets.conf

    [/main]
    /drives/main
    accs: rwmd: *

    [/external1]
    /drives/external1
    accs: rwmd: *

    [/external2]
    /drives/external2
    accs: rwmd: *

    [/external3]
    /drives/external3
    name: Privado
    accs: rwmd: admin
